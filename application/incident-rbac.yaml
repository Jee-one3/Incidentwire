apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-engine
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: incident-engine-log-reader
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: incident-engine-log-reader
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: incident-engine-log-reader
subjects:
  - kind: ServiceAccount
    name: incident-engine
    namespace: monitoring
